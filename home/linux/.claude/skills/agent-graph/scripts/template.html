<style>
  :root {

  @media (prefers-color-scheme: dark) {

      --surface: #1a1a19;
      --ink: #ffffff;
      --ink-2: #c3c2b7;

  :root[data-theme="light"] {
    --bg: #f9f9f7;
    --surface: #fcfcfb;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --line: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    --band: rgba(11, 11, 11, 0.028);
    --shadow: 0 8px 28px rgba(11, 11, 11, 0.14);
  }
  :root[data-theme="dark"] {
    --bg: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;

    --border: rgba(255, 255, 255, 0.10);

  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-variant-numeric: tabular-nums; }

  .board-wrap { margin: 8px 28px 48px; }

  .colhead {

  }
  .colhead .name { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .colhead .meta { font-size: 11px; color: var(--muted); }

  .band-label {
    position: absolute; font-size: 10px; font-weight: 700; letter-spacing: 0.13em;
    text-transform: uppercase; color: var(--muted); pointer-events: none; white-space: nowrap;
  }

  .node {
    position: absolute; padding: 7px 10px 6px; cursor: pointer;
    display: flex; flex-direction: column; gap: 1px; overflow: visible;
  }
  .node .t {
    font-size: 12px; font-weight: 650; line-height: 1.25; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: unset; -webkit-box-orient: vertical; overflow: visible; white-space: normal;
  }
  /* tight nodes only shrink the font — they must NOT line-clamp: with
     overflow:visible above, a clamp still shrinks the box's layout height to
     the clamped line count while the wrapped text visually spills past it,
     so the next flex sibling (.m/.sk) lands on top of that overflow instead
     of below it. Font-size alone keeps clamp and layout height in sync. */
  .node.tight .t { font-size: 11.5px; }
  .node[data-work="orchestration"] .t { -webkit-line-clamp: unset; white-space: normal; word-wrap: break-word; }
  /* .m/.sk set overflow:hidden for their ellipsis truncation, which under
     flexbox gives them an "automatic minimum size" of 0 — so instead of the
     node's flex column overflowing (which scrollHeight could then detect
     and grow from), the flex algorithm silently SHRINKS these two below
     their own natural text height when space is tight, clipping/overlapping
     their glyphs while scrollHeight still reports the constrained (fitting)
     height. Pin them to their natural size so a genuine shortfall shows up
     as real overflow instead of an invisible squeeze. Applies to every work
     type, not just orchestration — worker titles wrap just as often. */
  .node .m, .node .sk { flex-shrink: 0; }
  .node .m { font-size: 10.5px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node .m b { color: var(--nc); font-weight: 650; }
  .node .sk {

  .node .badge {

  .marker-label {

    /* Fallback cap only. The horizontal layout sizes labels inline from its own

    max-width: 146px; pointer-events: none;
  }
  .marker-label b { color: var(--ink); font-weight: 650; }
  .marker-label.row {

  path.shape { transition: filter 120ms ease, opacity 120ms ease; }

  .edge { pointer-events: none; transition: opacity 100ms ease, stroke-width 100ms ease, stroke-opacity 100ms ease; }

  path.shape.dim { opacity: 0.2; }

  .drawer {

</style>

(function () {
  var KEY = 'agentgraph:theme';
  var stored = null;
  try { stored = localStorage.getItem(KEY); } catch (e) { /* file:// may throw */ }
  if (stored === 'light' || stored === 'dark') document.documentElement.dataset.theme = stored;
  else try { localStorage.removeItem(KEY); } catch (e) {}
})();
</script>
